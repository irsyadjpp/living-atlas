groups:
  - name: ai_platform_alerts
    interval: 30s
    rules:
      - alert: ServiceDown
        expr: up{job="ai-services"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "AI Platform service {{ $labels.instance }} is down"
          description: "Service {{ $labels.instance }} has been down for more than 1 minute."

      - alert: HighPipelineFailureRate
        expr: rate(ai_pipeline_steps_total{status="failed"}[5m]) > 0.2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High pipeline failure rate (>20%)"
          description: "Pipeline failure rate is {{ $value | humanizePercentage }} over the last 5 minutes."

      - alert: HighLLMCost
        expr: sum(rate(ai_llm_tokens_total[5m])) * 0.000075 > 1.0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High LLM API cost rate"
          description: "LLM API cost rate is ${{ $value | humanize }} per hour."

      - alert: DatabaseConnectionsExhausted
        expr: ai_active_connections > 8
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Database connection pool nearly exhausted"
          description: "Active connections: {{ $value }} (max: 10)"

      - alert: HighJobFailureRate
        expr: rate(ai_jobs_completed_total{status="failed"}[15m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High job failure rate (>10%)"
          description: "Job failure rate is {{ $value | humanizePercentage }} over the last 15 minutes."

      - alert: LongLLMDuration
        expr: histogram_quantile(0.95, rate(ai_llm_duration_seconds_bucket[5m])) > 30
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "LLM request p95 latency exceeds 30s"
          description: "p95 LLM latency is {{ $value }}s"

      - alert: WeaviateDown
        expr: up{job="weaviate"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Weaviate vector store is down"
          description: "Weaviate has been unreachable for more than 1 minute."

      - alert: HighEmbeddingCost
        expr: rate(ai_llm_tokens_total{model="text-embedding-3-small"}[5m]) * 0.00000013 > 0.10
        for: 10m
        labels:
          severity: info
        annotations:
          summary: "High embedding API cost"
          description: "Embedding cost rate is ${{ $value | humanize }} per hour."