global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: 'otel-collector'
    scrape_interval: 10s
    static_configs:
      - targets: ['otel-collector:8889']
        labels:
          service: 'otel-collector'

  - job_name: 'ai-services'
    scrape_interval: 15s
    metrics_path: /metrics
    static_configs:
      - targets:
          - 'ingestion-service:8000'
          - 'extraction-service:8000'
          - 'normalization-service:8000'
          - 'validation-service:8000'
          - 'enrichment-service:8000'
          - 'embedding-service:8000'
          - 'article-service:8000'
          - 'orchestration-service:8000'
        labels:
          application: 'ai-platform'

  - job_name: 'postgres'
    scrape_interval: 30s
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'redpanda'
    scrape_interval: 15s
    static_configs:
      - targets: ['redpanda:9644']

  - job_name: 'weaviate'
    scrape_interval: 15s
    metrics_path: /metrics
    static_configs:
      - targets: ['weaviate:8080']