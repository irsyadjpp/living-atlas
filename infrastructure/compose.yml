# ============================================================
# Living Atlas — Docker Compose
# ============================================================
# Usage: docker compose -f infrastructure/compose.yml up -d
# Context: . = root repo (living-atlas/)
# dockerfile: relative to compose.yml directory (infrastructure/)
# ============================================================

networks:
  living-atlas:
    driver: bridge

volumes:
  postgres_data:
  redpanda_data:
  redis_data:
  weaviate_data:
  prometheus_data:
  grafana_data:
  loki_data:
  tempo_data:

services:
  postgres:
    image: docker.io/postgres:17-alpine
    container_name: living-postgres
    networks:
      - living-atlas
    ports:
      - "6432:5432"
    environment:
      POSTGRES_USER: ${LA_PG_USER:-living_atlas}
      POSTGRES_PASSWORD: ${LA_PG_PASSWORD:-living_atlas}
      POSTGRES_DB: ${LA_PG_DATABASE:-living_atlas}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LA_PG_USER:-living_atlas}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redpanda:
    image: docker.io/redpandadata/redpanda:v24.2.1
    container_name: living-redpanda
    networks:
      - living-atlas
    ports:
      - "9092:9092"
      - "9644:9644"
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092
      - --advertise-kafka-addr internal://redpanda:9092
      - --pandaproxy-addr internal://0.0.0.0:8082
      - --schema-registry-addr internal://0.0.0.0:8081
      - --rpc-addr internal://0.0.0.0:33145
      - --mode dev-container
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info | grep -qi brokers"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: docker.io/redis:7-alpine
    container_name: living-redis
    networks:
      - living-atlas
    ports:
      - "7379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  weaviate:
    image: docker.io/semitechnologies/weaviate:1.28.0
    container_name: living-weaviate
    networks:
      - living-atlas
    ports:
      - "8080:8080"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: text2vec-openai
      ENABLE_MODULES: text2vec-openai
      CLUSTER_HOSTNAME: node1
    volumes:
      - weaviate_data:/var/lib/weaviate
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  otel-collector:
    image: docker.io/otel/opentelemetry-collector-contrib:0.110.0
    container_name: living-otel
    networks:
      - living-atlas
    ports:
      - "4317:4317"
      - "8889:8889"
    volumes:
      - ./config/otel/otel-collector.yml:/etc/otel/config.yaml:ro
    command: ["--config", "/etc/otel/config.yaml"]

  prometheus:
    image: docker.io/prom/prometheus:v2.55.0
    container_name: living-prometheus
    networks:
      - living-atlas
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"

  grafana:
    image: docker.io/grafana/grafana:11.3.0
    container_name: living-grafana
    networks:
      - living-atlas
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana_data:/var/lib/grafana

  loki:
    image: docker.io/grafana/loki:3.2.0
    container_name: living-loki
    networks:
      - living-atlas
    ports:
      - "3100:3100"
    volumes:
      - ./config/loki/loki.yml:/etc/loki/config.yaml:ro
      - loki_data:/loki
    command: ["-config.file=/etc/loki/config.yaml"]

  tempo:
    image: docker.io/grafana/tempo:2.6.0
    container_name: living-tempo
    networks:
      - living-atlas
    ports:
      - "3200:3200"
    volumes:
      - ./config/tempo/tempo.yml:/etc/tempo/config.yaml:ro
      - tempo_data:/tmp/tempo
    command: ["-config.file=/etc/tempo/config.yaml"]

  ########################################
  # AI PLATFORM — Python Services
  ########################################

  ingestion-service:
    build:
      context: ../
      dockerfile: docker/python.Dockerfile
      args:
        SERVICE_DIR: ingestion-service
    container_name: ai-ingestion
    networks:
      - living-atlas
    ports:
      - "8001:8000"
    env_file:
      - ./.env
    environment:
      LA_SERVICE_NAME: ingestion-service
      LA_SERVICE_PORT: 8000
      LA_PG_HOST: postgres
      LA_KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy

  extraction-service:
