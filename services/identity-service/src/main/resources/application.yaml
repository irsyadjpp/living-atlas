spring:
  application:
    name: identity-service

  datasource:
    url: jdbc:postgresql://localhost:5432/living_atlas
    username: ${DB_USERNAME:living_atlas}
    password: ${DB_PASSWORD:living_atlas}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: auth
        jdbc:
          lob:
            non_contextual_creation: true
        format_sql: true
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    schemas: auth, iam, tenant, governance
    default-schema: auth
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8081

jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970337336763979244226452948404D635166546A576E5A7234753778214125442A47}
  expiration: 86400000
  refresh-expiration: 2592000000

logging:
  level:
    id.livingatlas: WARN
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  logback:
    masking:
      enabled: true
      patterns:
        - (?<=email=)[^&]+
        - (?<=password=)[^&]+
        - \\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}\\b
