spring:
  application:
    name: workflow-service
  datasource:
    url: jdbc:postgresql://localhost:5432/living_atlas
    username: ${DB_USERNAME:living_atlas}
    password: ${DB_PASSWORD:living_atlas}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: auth
        jdbc:
          lob:
            non_contextual_creation: true
        format_sql: true
    show-sql: false
    open-in-view: false

server:
  port: 8080

kafka:
  bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:-redpanda:9092}
  consumer:
    group-id: knowledge-service
    auto-offset-reset: earliest