spring:
  application:
    name: content-service
  datasource:
    url: jdbc:postgresql://postgres:5432/living_atlas
    username: ${LA_PG_USER:-living_atlas}
    password: ${LA_PG_PASSWORD:-living_atlas}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: content
  flyway:
    enabled: true
    schemas: content
    default-schema: content

server:
  port: 8080

kafka:
  bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:-redpanda:9092}
  consumer:
    group-id: content-service
    auto-offset-reset: earliest
  producer:
    key-serializer: org.apache.kafka.common.serialization.StringSerializer
    value-serializer: org.springframework.kafka.support.serializer.JsonSerializer