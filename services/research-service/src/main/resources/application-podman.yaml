spring:
  application:
    name: research-service
  datasource:
    url: jdbc:postgresql://postgres:5432/living_atlas
    username: ${LA_PG_USER:-living_atlas}
    password: ${LA_PG_PASSWORD:-living_atlas}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: research

server:
  port: 8080